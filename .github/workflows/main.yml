name: Build

on:
  push:
    tags:
      - "v*"
    branches:
      - "**"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-macos:
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m venv venv
          source venv/bin/activate
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build
        run: |
          source venv/bin/activate
          pyinstaller --noconfirm vial.spec

      - name: Package artifact
        run: |
          ditto -c -k --sequesterRsrc --keepParent dist/Vial.app vial-macos.zip

      - uses: actions/upload-artifact@v5
        with:
          name: vial-macos
          path: vial-macos.zip

  build-linux:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libusb-1.0-0-dev libudev-dev libegl1

      - name: Install dependencies
        run: |
          python -m venv venv
          source venv/bin/activate
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build
        run: |
          source venv/bin/activate
          pyinstaller --noconfirm vial.spec

      - name: Package artifact
        run: |
          tar -czf vial-linux.tar.gz -C dist Vial

      - uses: actions/upload-artifact@v5
        with:
          name: vial-linux
          path: vial-linux.tar.gz

  build-windows:
    runs-on: windows-2025

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        shell: powershell
        run: |
          python -m venv venv
          . .\venv\Scripts\Activate.ps1
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build
        shell: powershell
        run: |
          . .\venv\Scripts\Activate.ps1
          pyinstaller --noconfirm vial.spec

      - name: Package artifact
        shell: powershell
        run: |
          Compress-Archive -Path "dist\Vial*" -DestinationPath "vial-windows.zip" -Force

      - uses: actions/upload-artifact@v5
        with:
          name: vial-windows
          path: vial-windows.zip

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - build-macos
      - build-linux
      - build-windows
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5

      - name: Download artifacts
        uses: actions/download-artifact@v5
        with:
          path: release-artifacts

      - name: Create or update release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          gh release view "$tag" >/dev/null 2>&1 || gh release create "$tag" --title "$tag"
          gh release upload "$tag" \
            release-artifacts/vial-macos/vial-macos.zip \
            release-artifacts/vial-linux/vial-linux.tar.gz \
            release-artifacts/vial-windows/vial-windows.zip \
            --clobber
